            {

            },
            
            // Beverages
            {
                id: 17,
                name: 'Fresh Lime Soda',
                category: 'beverages',
                price: 59,
                image: '/Images/Menu/lime-soda.jpg',
                rating: 4.4,

                tags: ['refreshing', 'cold']
            },
            {
                id: 18,
                name: 'Mango Lassi',
                category: 'beverages',
                price: 69,
                image: '/Images/Menu/mango-lassi.jpg',
                rating: 4.6,
                reviews: 89,
                tags: ['traditional', 'sweet']
            }
        ];

        // State
        let currentCategory = 'all';
        let searchTerm = '';
        let filteredItems = [...menuItems];

        document.addEventListener('DOMContentLoaded', function() {
            // Initialize mobile menu
            initializeMobileMenu();
            
            // Load menu items
            renderMenuItems();
            
            // Setup category filters
            setupCategoryFilters();
            
            // Setup search
            setupSearch();
            
            // Update cart count
            updateCartCount();
        });

        // Initialize Mobile Menu
        function initializeMobileMenu() {
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenuClose = document.getElementById('mobile-menu-close');
            const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');
            const mobileMenu = document.getElementById('mobile-menu');
            
            function openMobileMenu() {
                mobileMenu.classList.add('active');
                mobileMenuOverlay.classList.add('active');
                mobileMenuBtn.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
            
            function closeMobileMenu() {
                mobileMenu.classList.remove('active');
                mobileMenuOverlay.classList.remove('active');
                mobileMenuBtn.classList.remove('active');
                document.body.style.overflow = '';
            }
            
            mobileMenuBtn.addEventListener('click', openMobileMenu);
            mobileMenuClose.addEventListener('click', closeMobileMenu);
            mobileMenuOverlay.addEventListener('click', closeMobileMenu);
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeMobileMenu();
                }
            });
        }

        // Setup Category Filters
        function setupCategoryFilters() {
            const categoryBtns = document.querySelectorAll('.category-btn');
            
            categoryBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // Remove active class from all buttons
                    categoryBtns.forEach(b => b.classList.remove('active'));
                    
                    // Add active class to clicked button
                    this.classList.add('active');
                    
                    // Update current category
                    currentCategory = this.dataset.category;
                    
                    // Filter and render items
                    filterAndRenderItems();
                });
            });
        }

        // Setup Search
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            
            searchInput.addEventListener('input', function() {
                searchTerm = this.value.toLowerCase();
                filterAndRenderItems();
            });
        }

        // Filter and Render Items
        function filterAndRenderItems() {
            filteredItems = menuItems.filter(item => {
                const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
                const matchesSearch = searchTerm === '' || 
                    item.name.toLowerCase().includes(searchTerm) ||
                    item.tags.some(tag => tag.toLowerCase().includes(searchTerm));
                
                return matchesCategory && matchesSearch;
            });
            
            renderMenuItems();
        }

        // Render Menu Items
        function renderMenuItems() {
            const menuGrid = document.getElementById('menu-grid');
            
            if (filteredItems.length === 0) {
                menuGrid.innerHTML = `
                    <div class="menu-empty">
                        <div class="menu-empty-icon">
                            <i class="fas fa-search"></i>
                        </div>
                        <h3>No dishes found</h3>
                        <p>Try adjusting your search or filters</p>
                        <button class="btn btn-primary" onclick="resetFilters()">
                            <i class="fas fa-redo"></i>
                            Reset Filters
                        </button>
                    </div>
                `;
                return;
            }
            
            menuGrid.innerHTML = filteredItems.map(item => `
                <div class="menu-card" onclick="addToCart(${item.id}, '${item.name}', ${item.price}, '${item.image}')">
                    <div class="menu-card-image">
                        <img src="${item.image}" alt="${item.name}" onerror="this.src='/Images/Home/placeholder-food.jpg'">
                        ${item.badge ? `<span class="menu-card-badge">${item.badge}</span>` : ''}
                    </div>
                    <div class="menu-card-content">
                        <div class="menu-card-header">
                            <h3 class="menu-card-name">${item.name}</h3>
                            <div class="menu-card-tags">
                                ${item.tags.map(tag => `<span class="menu-tag">${tag}</span>`).join('')}
                            </div>
                        </div>
                        <div class="menu-card-rating">
                            <div class="menu-stars">
                                ${generateStars(item.rating)}
                            </div>
                            <span class="menu-rating-text">${item.rating} (${item.reviews})</span>
                        </div>
                        <div class="menu-card-footer">
                            <div class="menu-price">₹${item.price}</div>
                            <button class="menu-add-btn" onclick="event.stopPropagation(); addToCart(${item.id}, '${item.name}', ${item.price}, '${item.image}')">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Generate Star Rating
        function generateStars(rating) {
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating % 1 !== 0;
            let stars = '';
            
            for (let i = 0; i < fullStars; i++) {
                stars += '<i class="fas fa-star"></i>';
            }
            
            if (hasHalfStar) {
                stars += '<i class="fas fa-star-half-alt"></i>';
            }
            
            const emptyStars = 5 - Math.ceil(rating);
            for (let i = 0; i < emptyStars; i++) {
                stars += '<i class="far fa-star"></i>';
            }
            
            return stars;
        }

        // Add to Cart
        function addToCart(id, name, price, image) {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            
            const existingItem = cart.find(item => item.id === id);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    id: id,
                    name: name,
                    price: price,
                    image: image,
                    quantity: 1
                });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showToast(`${name} added to cart!`);
            
            // Update button state
            const addBtn = event.target;
            if (addBtn.classList.contains('menu-add-btn')) {
                addBtn.classList.add('added');
                addBtn.innerHTML = '<i class="fas fa-check"></i>';
                
                setTimeout(() => {
                    addBtn.classList.remove('added');
                    addBtn.innerHTML = '<i class="fas fa-plus"></i>';
                }, 2000);
            }
        }

        // Update Cart Count
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            
            const cartCountElements = document.querySelectorAll('.cart-count');
            cartCountElements.forEach(element => {
                element.textContent = count;
                element.style.display = count > 0 ? 'block' : 'none';
            });
        }

        // Reset Filters
        function resetFilters() {
            currentCategory = 'all';
            searchTerm = '';
            
            // Reset category buttons
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === 'all') {
                    btn.classList.add('active');
                }
            });
            
            // Reset search input
            document.getElementById('search-input').value = '';
            
            // Filter and render
            filterAndRenderItems();
        }

        // Show Toast
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast success show';
            toast.innerHTML = `
                <i class="fas fa-check-circle"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // Listen for cart changes
        window.addEventListener('storage', function(e) {
            if (e.key === 'cart') {
                updateCartCount();
            }
        });
    </script>
